<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Escolha de Função</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Poppins', sans-serif;
    background: linear-gradient(135deg, #0f172a, #1e293b);
    color:#fff;
}

/* HEADER */
header{
    padding:20px 40px;
}

.logo{
    font-size:1.8em;
    font-weight:600;
}

/* CONTAINER */
.cta{
    text-align:center;
    margin-top:60px;
}

.grades-cards{
    display:flex;
    justify-content:center;
    gap:30px;
    margin-top:40px;
    flex-wrap:wrap;
}

/* CARDS */
.cards{
    width:260px;
    height:160px;
    display:flex;
    align-items:center;
    justify-content:center;
    border-radius:20px;
    background: rgba(255,255,255,0.05);
    border:1px solid rgba(255,255,255,0.1);
    cursor:pointer;
    transition:.3s;
}

.cards:hover{
    transform: translateY(-10px) scale(1.03);
    box-shadow:0 10px 30px rgba(0,0,0,0.5);
}

/* MODAL */
.modal{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.6);
    display:flex;
    align-items:center;
    justify-content:center;
    opacity:0;
    pointer-events:none;
    transition:.3s;
}

.modal.active{
    opacity:1;
    pointer-events:all;
}

/* CAIXA */
.modal-box{
    background:#1e293b;
    padding:30px;
    border-radius:15px;
    width:300px;
    text-align:center;
    animation: scaleIn .3s ease;
}

@keyframes scaleIn{
    from{ transform:scale(0.8); opacity:0;}
    to{ transform:scale(1); opacity:1;}
}

.modal-box h3{
    margin-bottom:20px;
}

/* INPUT */
.modal-box input{
    width:100%;
    padding:12px;
    border-radius:10px;
    border:none;
    outline:none;
    text-align:center;
    margin-bottom:15px;
}

/* BOTÃO */
.modal-box button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:10px;
    background:#00d4ff;
    font-weight:bold;
    cursor:pointer;
}

/* MSG */
.msg{
    margin-top:10px;
    font-size:14px;
}

.erro{ color:#ff4d4d; }
.sucesso{ color:#00ff88; }
</style>
</head>

<body>

<header>
    <div class="logo">Minha Empresa</div>
</header>

<div class="cta">
    <h1>Escolha a sua Função</h1>

    <div class="grades-cards">
        <div class="cards" onclick="abrirModal('admin')">Administrador</div>
        <div class="cards" onclick="abrirModal('gestor')">Gestor</div>
        <div class="cards" onclick="abrirModal('funcionario')">Funcionário</div>
    </div>
</div>

<!-- MODAL -->
<div class="modal" id="modal">
    <div class="modal-box">
        <h3 id="titulo">Digite o PIN</h3>
        <input type="password" id="pinInput" placeholder="PIN">
        <button onclick="verificar()">Entrar</button>
        <div class="msg" id="msg"></div>
    </div>
</div>

<script>
let tipoAtual = "";

function abrirModal(tipo){
    tipoAtual = tipo;

    const titulo = document.getElementById("titulo");
    titulo.innerText = "Digite o PIN - " + tipo.toUpperCase();

    document.getElementById("modal").classList.add("active");
}

function verificar(){

    const dados = {
        admin: {
            pin: "1234",
            url: "https://moscovo5.github.io/gestao-de-empresa/"
        },
        gestor: {
            pin: "5678",
            url: "https://moscovo5.github.io/pagina-dos-Gestores-da-empresa/"
        },
        funcionario: {
            pin: "0000",
            url: "https://moscovo5.github.io/pagina-dos-funcionarios-da-empresa/"
        }
    };

    const input = document.getElementById("pinInput").value;
    const msg = document.getElementById("msg");

    if(input === dados[tipoAtual].pin){
        msg.innerText = "Acesso permitido!";
        msg.className = "msg sucesso";

        setTimeout(()=>{
            window.location.href = dados[tipoAtual].url;
        },1000);

    }else{
        msg.innerText = "PIN incorreto!";
        msg.className = "msg erro";
    }
}

/* FECHAR AO CLICAR FORA */
document.getElementById("modal").addEventListener("click", (e)=>{
    if(e.target.id === "modal"){
        e.target.classList.remove("active");
    }
});
</script>

</body>
</html>
